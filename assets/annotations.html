<div class="annotation-rail" id="annotation-rail-left" data-annotation-side="left" aria-label="左侧批注卡片"></div>
<div class="annotation-rail" id="annotation-rail" data-annotation-side="right" aria-label="右侧批注卡片"></div>
<div class="annotation-overview-dock" id="annotation-overview-dock">
  <button type="button" id="annotation-overview-open">总记录</button>
  <button type="button" id="annotation-save-html">保存</button>
  <div id="annotation-save-toasts" class="annotation-save-toasts" role="status" aria-live="polite"></div>
  <div class="annotation-overview-panel" id="annotation-overview-panel" role="dialog" aria-label="总记录">
    <header>
      <span>总记录</span>
      <button type="button" id="annotation-overview-close">关闭</button>
    </header>
    <textarea id="annotation-overview-text" placeholder="记录这篇 HTML 的整体问题、核心判断或想交给 AI 继续深读的方向..."></textarea>
    <div class="annotation-overview-actions">
      <span>自动保存文本，导出批注时置于最前。</span>
    </div>
  </div>
</div>
<div class="annotation-export" id="annotation-export">
  <button type="button" id="annotation-body-background-toggle" class="annotation-background-toggle" aria-pressed="false">Background</button>
  <button type="button" id="annotation-export-open">Menu</button>
  <div class="annotation-export-panel" id="annotation-export-panel" role="dialog" aria-label="html-note menu">
    <header>
      <span>Menu</span>
      <button type="button" id="annotation-export-html">Save as</button>
    </header>
    <section class="annotation-layer-panel" aria-label="annotation groups">
      <div class="annotation-panel-title">
        <span>Groups</span>
        <button type="button" id="annotation-layer-add">new group</button>
      </div>
      <div class="annotation-layer-list" id="annotation-layer-list"></div>
      <div class="annotation-layer-confirm" id="annotation-layer-confirm" role="dialog" aria-label="group dialog" hidden>
        <div class="annotation-layer-confirm-card">
          <strong id="annotation-layer-dialog-title">里面有批注，确认是否删除</strong>
          <input type="text" id="annotation-layer-name-input" aria-label="group name" hidden>
          <div class="annotation-layer-confirm-actions">
            <button type="button" id="annotation-layer-delete-cancel">cancel</button>
            <button type="button" id="annotation-layer-delete-confirm">delete</button>
          </div>
        </div>
      </div>
    </section>
    <div class="annotation-tag-row">
      <div class="annotation-export-tags" id="annotation-export-tags"></div>
      <div class="annotation-tag-tools">
        <button type="button" id="annotation-export-all">all</button>
        <button type="button" id="annotation-export-clear">reset</button>
      </div>
    </div>
    <div class="row annotation-export-actions">
      <button type="button" id="annotation-export-download">Export MD</button>
      <button type="button" id="annotation-clear-tags">Clear notes</button>
    </div>
  </div>
</div>
<div class="annotation-popover" id="annotation-popover" role="dialog" aria-label="新增批注">
  <header>
    <span id="annotation-excerpt">选区批注</span>
    <button type="button" id="annotation-close">关闭</button>
  </header>
  <div class="text-mode">
    <textarea id="annotation-text" placeholder="写下你的想法、疑问或下一步动作..."></textarea>
    <div class="tag-hint">点击选择一个标签；按住 Shift 可多选。</div>
    <div class="tag-list" id="annotation-tag-list"></div>
    <div class="row tag-create" id="annotation-tag-create" hidden>
      <input type="text" id="annotation-tag-input" placeholder="新标签，例如：疑问">
      <button type="button" id="annotation-tag-confirm">确定</button>
    </div>
  </div>
  <div class="board">
    <div class="board-tools" aria-label="白板工具">
      <button type="button" data-tool="pen" aria-pressed="true">画笔</button>
      <button type="button" data-tool="line">直线</button>
      <button type="button" data-tool="arrow">箭头</button>
      <button type="button" data-tool="rect">矩形</button>
      <button type="button" data-tool="circle">圆</button>
      <button type="button" data-tool="triangle">三角</button>
      <button type="button" data-tool="eraser">橡皮</button>
      <button type="button" id="board-undo">撤回</button>
      <button type="button" id="board-redo">重做</button>
      <button type="button" id="board-paste-image">粘贴图片</button>
      <input type="color" id="board-color" value="#2c5e3f" aria-label="白板颜色">
      <input type="range" id="board-size" min="1" max="18" value="3" aria-label="白板粗细">
    </div>
    <div class="board-viewport">
      <canvas id="annotation-board" width="1200" height="800" aria-label="无线白板"></canvas>
    </div>
  </div>
  <div class="row annotation-actions">
    <button type="button" id="annotation-copy" class="icon-button" title="复制评论" aria-label="复制评论"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2"></rect><path d="M5 15V7a2 2 0 0 1 2-2h8"></path></svg></button>
    <button type="button" id="annotation-toggle-board" class="icon-button" title="进入画板" aria-label="进入画板"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5 14.5 9l3 3L7 22H4z"></path><path d="m13 10 2-2a2.1 2.1 0 0 1 3 3l-2 2"></path><path d="M5 5h14"></path></svg></button>
    <button type="button" id="annotation-done">完成</button>
  </div>
  <input type="file" id="board-file" accept="image/*" hidden>
</div>
